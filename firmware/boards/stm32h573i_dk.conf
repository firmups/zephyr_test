###############################################################################
# stm32h573i_dk board overlay
###############################################################################

# Static IP configuration
CONFIG_NET_CONFIG_MY_IPV4_ADDR="192.0.2.1"
CONFIG_NET_CONFIG_PEER_IPV4_ADDR="192.0.2.2"
CONFIG_NET_CONFIG_MY_IPV4_NETMASK="255.255.255.0"
CONFIG_NET_CONFIG_MY_IPV4_GW="192.0.0.254"
CONFIG_NET_CONFIG_INIT_TIMEOUT=5
CONFIG_TEST_RANDOM_GENERATOR=y
CONFIG_TIMER_RANDOM_GENERATOR=y

## Fatfs for SD-Card
CONFIG_DISK_DRIVER_SDMMC=y
CONFIG_FS_FATFS_NUM_FILES=6
CONFIG_FS_FATFS_LFN=y
# CONFIG_FS_FATFS_REENTRANT=y
# CONFIG_FS_FATFS_CUSTOM_MOUNT_POINT_COUNT=1
# CONFIG_FS_FATFS_CUSTOM_MOUNT_POINTS="data"

CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_MKFS=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_FSTAB_AUTOMOUNT=y

# MCUboot
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y
