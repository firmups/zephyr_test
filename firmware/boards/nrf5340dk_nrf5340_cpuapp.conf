###############################################################################
# nrf5340dk_nrf5340_cpuapp board config
###############################################################################

# Flash drivers
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# MCUboot
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y

# Bluetooth — central role towards RW612 gateway
CONFIG_BT=y
CONFIG_BT_CENTRAL=y
CONFIG_BT_GATT_CLIENT=y
CONFIG_BT_DEVICE_NAME="firmups-nrf5340"

# ATT MTU — 517 bytes allows 514-byte firmware chunk notifications from RW612
CONFIG_BT_L2CAP_TX_MTU=517
CONFIG_BT_BUF_ACL_TX_SIZE=521
CONFIG_BT_BUF_ACL_RX_SIZE=521

# Disable UICR-based APPROTECT so the firmware doesn't re-lock the chip
# after flashing (factory UICR has APPROTECT=0x00 which means "locked")
CONFIG_NRF_APPROTECT_USE_UICR=n
CONFIG_NRF_SECURE_APPROTECT_USE_UICR=n

CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_FIRMUPS_LOG_LEVEL_INF=y
CONFIG_LOG_BUFFER_SIZE=8192

