###############################################################################
# frdm_rw612 board config
###############################################################################

# LittleFS on external QSPI flash (no SD card on this board)
CONFIG_FILE_SYSTEM_LITTLEFS=y
CONFIG_FILE_SYSTEM_MKFS=y

# Flash drivers
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_FLASH_PAGE_LAYOUT=y

# MCUboot
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y

# WiFi — NXP RW612 integrated radio
CONFIG_WIFI=y
CONFIG_WIFI_NXP=y
CONFIG_NXP_RW610=y
CONFIG_ETH_DRIVER=n
CONFIG_NET_L2_WIFI_MGMT=y
CONFIG_NET_CONFIG_AUTO_INIT=y

# DHCPv4 (overrides any static IP from prj.conf)
CONFIG_NET_DHCPV4=y
CONFIG_NET_CONFIG_INIT_TIMEOUT=30

# Stack sizes for WiFi
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4608

CONFIG_NEWLIB_LIBC=y

CONFIG_LOG=y
CONFIG_NET_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_FIRMUPS_LOG_LEVEL_INF=y
CONFIG_LOG_BUFFER_SIZE=8192

# Bluetooth — NXP RW612 integrated radio
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="firmups-device"

# ATT MTU — match nRF5340 central; allows 514-byte firmware chunks per notification
CONFIG_BT_L2CAP_TX_MTU=517
CONFIG_BT_BUF_ACL_TX_SIZE=521
CONFIG_BT_BUF_ACL_RX_SIZE=521

# Firmups BT Gateway
CONFIG_FIRMUPS_GATEWAY=y
CONFIG_FIRMUPS_BT_GATEWAY=y
CONFIG_FIRMUPS_BT_GATEWAY_RESPONSE_BUFFER_SIZE=514

CONFIG_BT_MAX_CONN=4
